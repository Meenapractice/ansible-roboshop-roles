- name: "App setup"
  ansible.builtin.import_role:
    name: common
    tasks_from: app-setup.yaml

- name: "python setup"
  ansible.builtin.import_role:
    name: common
    tasks_from: python-setup.yaml

- name: system service
  ansible.builtin.import_role:
    name: common
    tasks_from: service-setup.yaml

- name: start enable payment
  ansible.builtin.service:
    name: payment
    state: restarted
    enabled: yes