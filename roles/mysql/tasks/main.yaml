  - name: "Install mysql server"
    ansible.builtin.dnf:
      name: mysql-server
      state: present

  - name: "Enabling mysql service"
    ansible.builtin.service:
      name: mysqld
      state: restarted
      enabled: yes

  - name: "Setting password"
    ansible.builtin.command: mysql_secure_installation --set-root-pass "{{ password }}"
    